routes:
  unmatched: path
attributes:
  select:
    traces:
      include:
      - gen_ai.input.messages
      - gen_ai.system_instructions
      - gen_ai.output.messages
      - gen_ai.metadata
      - gen_ai.tool.definitions
ebpf:
  buffer_sizes:
    http: 65536
  protocol_debug_print: true
  payload_extraction:
    http:
      genai:
        openai:
          enabled: true
        anthropic:
          enabled: true
        gemini:
          enabled: true
        qwen:
          enabled: true
        bedrock:
          enabled: true
trace_printer: text
discovery:
  exclude_otel_instrumented_services: false
