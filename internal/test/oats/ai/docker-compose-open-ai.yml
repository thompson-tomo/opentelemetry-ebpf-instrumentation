version: "3.9"
services:
  openai:
    build:
      context: ../../integration/components/ai/openai/mock-server
      dockerfile: Dockerfile
    image: openai
    ports:
      - "8081:8081"
  testserver:
    build:
      context: ../../integration/components/ai/openai
      dockerfile: Dockerfile
    image: testserver
    ports:
      - "8080:8080"
    environment:
      OPENAI_BASE_URL: "http://openai:8081"
    depends_on:
      openai:
        condition: service_started
  # eBPF auto instrumenter
  autoinstrumenter:
    build:
      context: ../../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    command:
      - --config=/configs/instrumenter-config-traces-genai.yml
    volumes:
      - ./configs:/configs
      - ./testoutput/run:/var/run/obi
      - ../../../../testoutput:/coverage
    cap_add:
      - SYS_ADMIN
    privileged: true # in some environments (not GH Pull Requests) you can set it to false and then cap_add: [ SYS_ADMIN ]
    network_mode: "service:testserver"
    pid: "service:testserver"
    environment:
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_OPEN_PORT: 8080
      OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT: "1ms"
      OTEL_EBPF_SERVICE_NAMESPACE: "integration-test"
      OTEL_EBPF_METRICS_INTERVAL: "1s"
      OTEL_EBPF_BPF_BATCH_TIMEOUT: "10ms"
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
      OTEL_EBPF_BPF_DEBUG: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://collector:4318"
    depends_on:
      testserver:
        condition: service_started
