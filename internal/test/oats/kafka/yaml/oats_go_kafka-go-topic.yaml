oats-schema-version: 2
docker-compose:
  files:
  - ../docker-compose-obi-go-kafka-go.yml
  - ../../weaver/docker-compose-weaver.yml
input:
- path: /withTopic
interval: 500ms
expected:
  traces:
  - traceql: '{ .messaging.operation.type = "publish" && .messaging.destination.name="logging" && kind = producer }'
    equals: publish logging
    attributes:
      messaging.destination.name: logging
      messaging.operation.type: publish
      messaging.system: kafka
      server.port: '9092'
  - traceql: '{ .messaging.operation.type = "process" && .messaging.destination.name="logging" && kind = consumer }'
    equals: process logging
    attributes:
      messaging.destination.name: logging
      messaging.operation.type: process
      messaging.system: kafka
      server.port: '9092'
  metrics:
  - promql: messaging_client_operation_duration_seconds_count{messaging_system="kafka", messaging_destination_name="logging"}
    value: '> 0'
  - promql: messaging_client_operation_duration_seconds_bucket{le="0"}
    value: == 0
  - promql: messaging_client_operation_duration_seconds_bucket{le="10"}
    value: '> 0'
  - promql: messaging_process_duration_seconds_count{messaging_system="kafka", messaging_destination_name="logging"}
    value: '> 0'
  - promql: messaging_process_duration_seconds_bucket{le="0"}
    value: == 0
  - promql: messaging_process_duration_seconds_bucket{le="10"}
    value: '> 0'
