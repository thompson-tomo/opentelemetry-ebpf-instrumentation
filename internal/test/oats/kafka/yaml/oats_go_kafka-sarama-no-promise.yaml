oats-schema-version: 2
docker-compose:
  files:
  - ../docker-compose-obi-go-kafka-sarama-no-promise.yml
  - ../../weaver/docker-compose-weaver.yml
input:
- path: /message
interval: 500ms
expected:
  traces:
  - traceql: '{ .messaging.operation.type = "publish" && .messaging.destination.name="orders"}'
    equals: publish orders
    attributes:
      messaging.destination.name: orders
      messaging.operation.type: publish
      messaging.system: kafka
      server.port: '9092'
