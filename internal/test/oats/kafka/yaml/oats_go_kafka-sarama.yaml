oats-schema-version: 2
docker-compose:
  files:
  - ../docker-compose-obi-go-kafka-sarama.yml
  - ../../weaver/docker-compose-weaver.yml
input:
- path: /?data
interval: 500ms
expected:
  traces:
  - traceql: '{ .messaging.operation.type = "process" && .messaging.destination.name="important"}'
    equals: process important
    attributes:
      messaging.destination.name: important
      messaging.operation.type: process
      messaging.system: kafka
      server.port: '9092'
  - traceql: '{ .messaging.operation.type = "publish" && .messaging.destination.name="important"}'
    equals: publish important
    attributes:
      messaging.destination.name: important
      messaging.operation.type: publish
      messaging.system: kafka
      server.port: '9092'
  - traceql: '{ .messaging.operation.type = "publish" && .messaging.destination.name="access_log"}'
    equals: publish access_log
    attributes:
      messaging.destination.name: access_log
      messaging.operation.type: publish
      messaging.system: kafka
      server.port: '9092'
  metrics:
  - promql: messaging_client_operation_duration_seconds_count{messaging_system="kafka", messaging_destination_name="important"}
    value: '> 0'
  - promql: messaging_client_operation_duration_seconds_bucket{le="0"}
    value: == 0
  - promql: messaging_client_operation_duration_seconds_bucket{le="10"}
    value: '> 0'
  - promql: messaging_process_duration_seconds_count{messaging_system="kafka", messaging_destination_name="important"}
    value: '> 0'
  - promql: messaging_process_duration_seconds_bucket{le="0"}
    value: == 0
  - promql: messaging_process_duration_seconds_bucket{le="10"}
    value: '> 0'
