oats-schema-version: 2
docker-compose:
  files:
  - ../docker-compose-obi-java-kafka.yml
  - ../../weaver/docker-compose-weaver.yml
input:
- path: /message
interval: 500ms
expected:
  traces:
  - traceql: '{ .messaging.operation.type = "process" }'
    regexp: ^process
    attributes:
      messaging.operation.type: process
      messaging.system: kafka
      server.port: '9092'
  - traceql: '{ .messaging.operation.type = "publish" }'
    regexp: ^publish
    attributes:
      messaging.operation.type: publish
      messaging.system: kafka
      server.port: '9092'
  metrics:
  - promql: messaging_client_operation_duration_seconds_count{messaging_system="kafka"}
    value: '> 0'
  - promql: messaging_client_operation_duration_seconds_bucket{le="0"}
    value: == 0
  - promql: messaging_client_operation_duration_seconds_bucket{le="10"}
    value: '> 0'
  - promql: messaging_process_duration_seconds_count{messaging_system="kafka"}
    value: '> 0'
  - promql: messaging_process_duration_seconds_bucket{le="0"}
    value: == 0
  - promql: messaging_process_duration_seconds_bucket{le="10"}
    value: '> 0'
