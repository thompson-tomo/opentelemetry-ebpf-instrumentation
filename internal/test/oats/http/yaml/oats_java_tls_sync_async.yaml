oats-schema-version: 2
docker-compose:
  files:
  - ../docker-compose-java-tls-sync-async.yml
  - ../../weaver/docker-compose-weaver.yml
input:
- path: /request
interval: 500ms
expected:
  traces:
  - traceql: '{ .http.route = "/greeting" }'
    equals: GET /greeting
    attributes:
      server.port: '8443'
      url.path: /greeting
  - traceql: '{ .url.full = "https://google.com/" }'
    equals: GET /
    attributes:
      server.port: '443'
