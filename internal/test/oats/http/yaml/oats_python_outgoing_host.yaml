oats-schema-version: 2
docker-compose:
  files:
  - ../docker-compose-python-unresolved.yml
  - ../../weaver/docker-compose-weaver.yml
input:
- path: /with_name
interval: 500ms
expected:
  traces:
  - traceql: '{kind=client && name="GET /" && span.service.peer.name="www.google.com"}'
    equals: GET /
  metrics:
  - promql: traces_service_graph_request_client_seconds_count{client="testserver", server="www.google.com"}
    value: '> 5'
