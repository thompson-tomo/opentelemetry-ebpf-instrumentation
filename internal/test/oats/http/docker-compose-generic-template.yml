version: "3.9"
services:
  grafana:
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    volumes:
      - "{{ .ConfigDir }}/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/grafana-datasources.yaml"
    ports:
      - "{{ .GrafanaHTTPPort }}:3000"
  prometheus:
    image: prom/prometheus:v3.13.0@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7
    command:
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "{{ .PrometheusHTTPPort }}:9090"
  tempo:
    image: grafana/tempo:3.0.0@sha256:78439f7f7cf3c97122846c13a832e060c6c7ef67dcc814dccf0a5f3f78393a93
    volumes:
      - "{{ .ConfigDir }}/tempo-config.yaml:/config.yaml"
    command:
      - --config.file=/config.yaml
    ports:
      - 4317:4317
      - "{{ .TempoHTTPPort }}:3200"
#  loki:
#    image: grafana/loki:2.9.0
#    ports:
#      - "{{ .LokiHTTPPort }}:3100"
  collector:
    image: otel/opentelemetry-collector-contrib:0.157.0@sha256:f2f01157055a9b2aab9df7118e1f1c9abf345e99b23bc7a2bc791db374a7d0f6
    volumes:
      - "{{ .ConfigDir }}/otelcol-config.yaml:/config.yaml"
    command:
      - --config=file:/config.yaml
    ports:
      - 4318:4318
