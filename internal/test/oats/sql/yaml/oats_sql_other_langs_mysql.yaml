oats-schema-version: 2
docker-compose:
  files:
  - ../docker-compose-obi-mysql.yml
  - ../../weaver/docker-compose-weaver.yml
input:
- path: /query
interval: 500ms
expected:
  traces:
  - traceql: '{ .db.operation.name = "SELECT" && .db.system.name = "mysql"}'
    equals: SELECT actor
    attributes:
      db.operation.name: SELECT
      db.collection.name: actor
      db.system.name: mysql
      db.query.text: SELECT * FROM actor WHERE actor_id=1
  metrics:
  - promql: db_client_operation_duration_seconds_sum{db_system_name="mysql"}
    value: '> 0'
  - promql: db_client_operation_duration_seconds_bucket{le="0", db_system_name="mysql"}
    value: == 0
  - promql: db_client_operation_duration_seconds_bucket{le="10", db_system_name="mysql"}
    value: '> 0'
  - promql: db_client_operation_duration_seconds_count{db_system_name="mysql"}
    value: '> 0'
