oats-schema-version: 2
docker-compose:
  files:
  - ../docker-compose-obi-sql.yml
  - ../../weaver/docker-compose-weaver.yml
input:
- path: /prepquery
interval: 500ms
expected:
  traces:
  - traceql: '{ .db.operation.name = "SELECT" && .db.system.name = "postgresql"}'
    equals: SELECT accounting.contacts
    attributes:
      db.operation.name: SELECT
      db.collection.name: accounting.contacts
      db.system.name: postgresql
  metrics:
  - promql: db_client_operation_duration_seconds_sum{db_system_name="postgresql"}
    value: '> 0'
  - promql: db_client_operation_duration_seconds_bucket{le="0", db_system_name="postgresql"}
    value: == 0
  - promql: db_client_operation_duration_seconds_bucket{le="10", db_system_name="postgresql"}
    value: '> 0'
  - promql: db_client_operation_duration_seconds_count{db_system_name="postgresql"}
    value: '> 0'
