oats-schema-version: 2
docker-compose:
  files:
  - ../docker-compose-obi-mysqlserver.yml
  - ../../weaver/docker-compose-weaver.yml
input:
- path: /mysqltest
interval: 500ms
expected:
  traces:
  - traceql: '{ kind=server && name="SELECT students" && .db.operation.name = "SELECT" && .db.system.name = "mysql" }'
    equals: SELECT students
    attributes:
      db.operation.name: SELECT
      db.collection.name: students
      db.system.name: mysql
