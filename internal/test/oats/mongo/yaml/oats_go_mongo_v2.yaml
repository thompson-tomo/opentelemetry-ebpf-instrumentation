oats-schema-version: 2
docker-compose:
  files:
  - ../docker-compose-go-mongo-v2.yml
  - ../../weaver/docker-compose-weaver.yml
input:
- path: /mongo
interval: 500ms
expected:
  traces:
  - traceql: '{ .http.route = "/mongo" }'
    equals: GET /mongo
    attributes:
      server.port: '8080'
      url.path: /mongo
  - traceql: '{ .db.operation.name = "insert" && .db.system.name = "mongodb" }'
    equals: insert testdb.items
    attributes:
      db.collection.name: testdb.items
      server.port: '27017'
