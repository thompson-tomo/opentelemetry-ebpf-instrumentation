services:
  testserver:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/javatestserver/Dockerfile_jar
    image: hatest-testserver-jvm-runtime-metrics
    ports:
      - "${TEST_SERVICE_PORTS}"
    environment:
      LOG_LEVEL: DEBUG
    command:
      - java
      - -Xms128m
      - -Xmx128m
      - -XX:+UseSerialGC
      - -Xlog:gc
      - -jar
      - /greeting-service-1.2.0.jar
    depends_on:
      otelcol:
        condition: service_started

  obi:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    volumes:
      - ./configs/:/configs
      - ./system/sys/kernel/security:/sys/kernel/security
      - ../../../testoutput:/coverage
      - ../../../testoutput/run-jvm-runtime-metrics:/var/run/obi
      - /sys/kernel/tracing:/sys/kernel/tracing:rw
    image: hatest-obi
    privileged: true
    pid: "host"
    environment:
      OTEL_EBPF_CONFIG_PATH: /configs/obi-config-jvm-runtime-metrics.yml
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_DISCOVERY_POLL_INTERVAL: 500ms
      OTEL_EBPF_SERVICE_NAMESPACE: "integration-test"
      OTEL_EBPF_METRICS_INTERVAL: "10ms"
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
      OTEL_EBPF_BPF_DEBUG: "TRUE"
      OTEL_EBPF_HOSTNAME: "obi"
      OTEL_EBPF_PROCESSES_INTERVAL: "100ms"
      OTEL_EBPF_EXECUTABLE_PATH: "java"
      OTEL_SERVICE_NAME: "jvm-runtime"
      OTEL_EBPF_PROMETHEUS_PORT: "8999"
      OTEL_EBPF_PROMETHEUS_TTL: "250ms"
    depends_on:
      testserver:
        condition: service_started
    ports:
      - "${OTEL_EBPF_PROMETHEUS_HOST_PORT:-8999}:8999"

  prometheus:
    image: quay.io/prometheus/prometheus:v3.13.0@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus-config-promscrape.yml
      - --web.enable-lifecycle
      - --web.route-prefix=/
    volumes:
      - ./configs/:/etc/prometheus
    ports:
      - "9090:9090"

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.157.0@sha256:f2f01157055a9b2aab9df7118e1f1c9abf345e99b23bc7a2bc791db374a7d0f6
    container_name: otel-col
    deploy:
      resources:
        limits:
          memory: 125M
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config/otelcol-config-weaver-no-jaeger.yml"]
    volumes:
      - ./configs/:/etc/otelcol-config
    ports:
      - "4317"
      - "4318:4318"
      - "9464"
      - "8888"
    depends_on:
      prometheus:
        condition: service_started
      weaver:
        condition: service_healthy

  weaver:
    extends:
      file: components/weaver/service.yml
      service: weaver
    volumes:
      - ../../../schemas/obi:/obi-registry:ro
