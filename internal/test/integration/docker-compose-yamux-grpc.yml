services:
  # Server that reads HTTP/2 frames tunneled over a yamux-style length-prefixed
  # transport, mimicking GitLab Gitaly's backchannel wire layout (issue #2706).
  yamux-server:
    build:
      context: ../../..
      dockerfile: internal/test/integration/components/yamux/Dockerfile
    image: hatest-yamux-h2-corrupt
    environment:
      MODE: "server"
      GRPC_PORT: "50051"
      HEALTH_PORT: "8080"
    ports:
      - "8080:8080"

  # Client: on each inbound HTTP /call (carrying a Traceparent) it opens a fresh
  # connection to the server and tunnels the HTTP/2 preface + HEADERS frames.
  yamux-client:
    build:
      context: ../../..
      dockerfile: internal/test/integration/components/yamux/Dockerfile
    image: hatest-yamux-h2-corrupt
    environment:
      MODE: "client"
      TARGET: "yamux-server:50051"
      HEALTH_PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      yamux-server:
        condition: service_started

  obi:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    command:
      - --config=/configs/obi-config-yamux-grpc.yml
    volumes:
      - ./configs/:/configs
      - ./system/sys/kernel/security${SECURITY_CONFIG_SUFFIX}:/sys/kernel/security
      - /sys/fs/bpf:/sys/fs/bpf
      - /sys/fs/cgroup:/sys/fs/cgroup
      - ../../../testoutput:/coverage
      - ../../../testoutput/run-yamux-grpc:/var/run/obi
    image: hatest-obi
    privileged: true
    pid: "host"
    cgroup: "host"
    environment:
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_TRACE_PRINTER: "text"
      OTEL_EBPF_METRICS_INTERVAL: "${OTEL_EBPF_METRICS_INTERVAL:-1s}"
      OTEL_EBPF_BPF_BATCH_TIMEOUT: "${OTEL_EBPF_BPF_BATCH_TIMEOUT:-250ms}"
      OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT: "${OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT:-200ms}"
      OTEL_EBPF_HOSTNAME: "beyla"
      # The trigger for issue #2706: HPACK traceparent injection via sk_msg.
      OTEL_EBPF_BPF_CONTEXT_PROPAGATION: "${OTEL_EBPF_BPF_CONTEXT_PROPAGATION:-all}"
      OTEL_EBPF_DISCOVERY_POLL_INTERVAL: "${OTEL_EBPF_DISCOVERY_POLL_INTERVAL:-1s}"
      OTEL_EBPF_BPF_DEBUG: "${OTEL_EBPF_BPF_DEBUG:-false}"
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
    depends_on:
      yamux-client:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.60@sha256:4fd2d70fa347d6a47e79fcb06b1c177e6079f92cba88b083153d56263082135e
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=debug
