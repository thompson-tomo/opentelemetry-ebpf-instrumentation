services:
  testserver:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/rubytestserver/testapi/Dockerfile_ruby302_puma5
    image: hatest-ruby302-puma5
    ports:
      - "${TEST_SERVICE_PORTS}"
    environment:
      OTEL_SERVICE_NAME: "my-ruby-app"
      OTEL_RESOURCE_ATTRIBUTES: "cloud.region=ca,deployment.environment.name=to"
    depends_on:
      otelcol:
        condition: service_started

  nginx:
    image: nginx:1.31.3@sha256:5a88c9c45479443d7be2eadc894b4ed0a9801bae03d97a5760ae13b5c2005942
    container_name: nginx_server
    ports:
      - "8443:443"
    volumes:
      - ./components/rubytestserver/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./components/rubytestserver/nginx/cert.pem:/etc/nginx/cert.pem:ro
      - ./components/rubytestserver/nginx/key.pem:/etc/nginx/key.pem:ro
    depends_on:
      - testserver

  obi:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    command:
      - --config=/configs/obi-config-ruby.yml
    volumes:
      - ./configs/:/configs
      - ./system/sys/kernel/security:/sys/kernel/security
      - ../../../testoutput:/coverage
      - ../../../testoutput/run-ruby:/var/run/obi
    image: hatest-obi
    privileged: true
    network_mode: "host"
    pid: "host"
    environment:
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_TRACE_PRINTER: "text"
      OTEL_EBPF_OPEN_PORT: "${OTEL_EBPF_OPEN_PORT}"
      OTEL_EBPF_DISCOVERY_POLL_INTERVAL: 500ms
      OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT: "1ms"
      OTEL_EBPF_EXECUTABLE_PATH: "${OTEL_EBPF_EXECUTABLE_PATH}"
      OTEL_EBPF_SERVICE_NAMESPACE: "integration-test"
      OTEL_EBPF_METRICS_INTERVAL: "1s"
      OTEL_EBPF_BPF_BATCH_TIMEOUT: "10ms"
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
      OTEL_EBPF_BPF_DEBUG: "TRUE"
      OTEL_EBPF_HOSTNAME: "obi"
    depends_on:
      testserver:
        condition: service_started

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.156.0@sha256:125bdbeb7590cc1952c5b3430ecf14063568980c2c93d5b38676cc0446ed8108
    container_name: otel-col
    deploy:
      resources:
        limits:
          memory: 125M
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config/otelcol-config-weaver.yml"]
    volumes:
      - ./configs/:/etc/otelcol-config
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464"
      - "8888"
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started
      weaver:
        condition: service_healthy

  weaver:
    extends:
      file: components/weaver/service.yml
      service: weaver
    volumes:
      - ../../../schemas/obi:/obi-registry:ro

  prometheus:
    image: quay.io/prometheus/prometheus:v3.13.0@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus-config.yml
      - --web.enable-lifecycle
      - --web.route-prefix=/
    volumes:
      - ./configs/:/etc/prometheus
    ports:
      - "9090:9090"

  jaeger:
    image: jaegertracing/jaeger:2.19.0@sha256:ede4864215be4cd85bd8c3129a2fea6c5713c5653c7282c429dba123014bc68b
    ports:
      - "16686:16686"
      - "4417:4317"
      - "4418:4318"
    environment:
      - LOG_LEVEL=debug
