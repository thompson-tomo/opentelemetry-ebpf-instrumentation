services:
  testserver:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/go-stat-metrics-server/Dockerfile
    image: hatest-testserver-go-stat-metrics
    ports:
      - "${TEST_SERVICE_PORTS}"
    depends_on:
      otelcol:
        condition: service_started
    
  testclient:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/go-stat-metrics-client/Dockerfile
    image: hatest-testclient-go-stat-metrics
    environment:
      - TARGET_ADDRESS=testserver:8080
      - FAIL_TARGET_ADDRESS=testserver:19999

  testclient-retransmit:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/go-stat-metrics-client/Dockerfile
    image: hatest-testclient-go-stat-metrics
    environment:
      - RETRANSMIT_TARGET_ADDRESS=testserver:8081
    depends_on:
      testserver:
        condition: service_started

  obi:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    volumes:
      - ./configs/:/configs
      - ./system/sys/kernel/security:/sys/kernel/security
      - ../../../testoutput:/coverage
      - ../../../testoutput/run-go-stat-metrics:/var/run/obi
      - /sys/kernel/tracing:/sys/kernel/tracing:rw
    image: hatest-obi
    privileged: true # in some environments (not GH Pull Requests) you can set it to false and then cap_add: [ SYS_ADMIN ]
    pid: "host"
    environment:
      OTEL_EBPF_CONFIG_PATH: /configs/obi-config${OTEL_EBPF_CONFIG_SUFFIX}.yml
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_TRACE_PRINTER: "json"
      OTEL_EBPF_DISCOVERY_POLL_INTERVAL: 500ms
      OTEL_EBPF_SERVICE_NAMESPACE: "integration-test"
      OTEL_EBPF_METRICS_INTERVAL: "1s"
      OTEL_EBPF_BPF_BATCH_TIMEOUT: "10ms"
      OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT: "1ms"
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
      OTEL_EBPF_BPF_DEBUG: "TRUE"
      OTEL_EBPF_HOSTNAME: "obi"
      OTEL_EBPF_BPF_HTTP_REQUEST_TIMEOUT: "5s"
      OTEL_EBPF_PROCESSES_INTERVAL: "100ms"
      OTEL_EBPF_METRICS_FEATURES: "stats"
      OTEL_EBPF_PROTOCOL_DEBUG_PRINT: "true"
      OTEL_EBPF_PROMETHEUS_PORT: "8999"
    depends_on:
      testserver:
        condition: service_started
    ports:
        - "8999:8999" # Prometheus scrape port, if enabled via config


  # OpenTelemetry Collector
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.157.0@sha256:f2f01157055a9b2aab9df7118e1f1c9abf345e99b23bc7a2bc791db374a7d0f6
    container_name: otel-col
    deploy:
      resources:
        limits:
          memory: 125M
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config/otelcol-config-weaver-no-jaeger.yml"]
    volumes:
      - ./configs/:/etc/otelcol-config
    ports:
      - "4317" # OTLP over gRPC receiver
      - "4318:4318" # OTLP over HTTP receiver
      - "9464" # Prometheus exporter
      - "8888" # metrics endpoint
    depends_on:
      prometheus:
        condition: service_started
      weaver:
        condition: service_healthy

  weaver:
    extends:
      file: components/weaver/service.yml
      service: weaver
    volumes:
      - ../../../schemas/obi:/obi-registry:ro

 # Prometheus
  prometheus:
    image: quay.io/prometheus/prometheus:v3.13.0@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus-config${PROM_CONFIG_SUFFIX}.yml
      - --web.enable-lifecycle
      - --web.route-prefix=/
    volumes:
      - ./configs/:/etc/prometheus
    ports:
      - "9090:9090"

  # pumba adds a 100ms delay to the testclient so the RTT test can assert avg RTT >= 100ms
  pumba:
    image: ghcr.io/alexei-led/pumba@sha256:b1226a1db9a82fdb74eb39ae36ef25ac576910edb569ae94dad3b640340656e8
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    privileged: true # in some environments (not GH Pull Requests) you can set it to false and then cap_add: [ SYS_ADMIN ]
    pid: "host"
    container_name: pumba
    command: netem --duration 30m delay --time 100 integration-testclient-1
    depends_on:
      testclient:
        condition: service_started

  # pumba-loss injects 20% packet loss on testclient-retransmit to trigger tcp_retransmit_skb events
  pumba-loss:
    image: ghcr.io/alexei-led/pumba@sha256:b1226a1db9a82fdb74eb39ae36ef25ac576910edb569ae94dad3b640340656e8
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    privileged: true
    pid: "host"
    container_name: pumba-loss
    command: netem --duration 30m loss --percent 20 integration-testclient-retransmit-1
    depends_on:
      testclient-retransmit:
        condition: service_started
