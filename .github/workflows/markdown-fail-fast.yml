name: Markdown

on:
  push:
    paths:
      - "**.md"
  pull_request:
    paths:
      - "**.md"

concurrency:
  group: markdown-check-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changedfiles:
    name: changed files
    runs-on: ubuntu-latest
    outputs:
      md: ${{ steps.changes.outputs.md }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Shallow clone, but enough for `git diff HEAD~1 HEAD`.
          fetch-depth: 2
          persist-credentials: false
      - name: Get changed files
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        shell: bash
        run: |
          echo "Detecting changed markdown files..."

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "Running in pull_request context"
            echo "Base SHA: $BASE_SHA"
            echo "Head SHA: $HEAD_SHA"
            CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -v '^NOTICES' | grep '\.md$' || true)
          elif [[ "$EVENT_NAME" == "push" ]]; then
            echo "Running in push context"
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -v '^NOTICES' | grep '\.md$' || true)
          else
            echo "Unsupported event type: $EVENT_NAME"
            exit 1
          fi

          MD=$(echo "$CHANGED" | tr '\n' ' ' | xargs)
          echo "Markdown files changed: $MD"
          echo "md=$MD" >> "$GITHUB_OUTPUT"

  lint:
    name: lint markdown files
    runs-on: ubuntu-latest
    needs: changedfiles
    if: ${{needs.changedfiles.outputs.md}}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run linter
        uses: docker://davidanson/markdownlint-cli2:v0.22.1@sha256:0ed9a5f4c77ef447da2a2ac6e67caf74b214a7f80288819565e8b7d2ac148fe5
        with:
          args: ${{needs.changedfiles.outputs.md}}
