# TODO: trigger only if testing or any other checks previously succeeded
name: Push k8s cache to DockerHub (main)
on:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      ref:
        description: "Git ref (commit, branch, or tag) to check out"
        required: false
        type: string
      latest:
        description: "Tag image as 'latest'"
        required: false
        type: boolean
        default: false
      nightly_version:
        description: "When set, publish nightly tags '<nightly_version>' and 'nightly' instead of release tags (e.g. nightly-20260708)"
        required: false
        type: string
        default: ""
    secrets:
      DOCKER_TOKEN_EBPF_INSTRUMENTATION:
        description: "Docker Hub access token for otel"
        required: true

permissions:
  contents: read

env:
  IMAGE_NAME: opentelemetry-ebpf-k8s-cache

jobs:
  build:
    if: github.repository == 'open-telemetry/opentelemetry-ebpf-instrumentation'
    permissions:
      packages: write
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact_suffix: arm64
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Compute short SHA
        id: short_sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION }}

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            otel/${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern=v{{version}},value=${{ inputs.ref }},enable=${{ inputs.ref != '' }}
            type=raw,value=latest,enable=${{ inputs.latest == true }}
            type=raw,value=${{ inputs.nightly_version }},enable=${{ inputs.nightly_version != '' }}
            type=raw,value=nightly,enable=${{ inputs.nightly_version != '' }}
            type=ref,event=branch,enable=${{ inputs.nightly_version == '' }}
            type=ref,event=tag,enable=${{ inputs.nightly_version == '' }}
            type=sha,prefix=,format=short,enable=${{ inputs.nightly_version == '' && inputs.ref == '' }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./k8scache.Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RELEASE_VERSION=${{ inputs.ref || steps.short_sha.outputs.sha }}
            RELEASE_REVISION=${{ steps.short_sha.outputs.sha }}
          outputs: type=image,"name=ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }},docker.io/otel/${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: k8s-cache-digests-${{ matrix.artifact_suffix }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  create-manifest-and-sign:
    if: github.repository == 'open-telemetry/opentelemetry-ebpf-instrumentation'
    needs: build
    permissions:
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: k8s-cache-digests-*

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION }}

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Check Cosign version
        run: cosign version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            otel/${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern=v{{version}},value=${{ inputs.ref }},enable=${{ inputs.ref != '' }}
            type=raw,value=latest,enable=${{ inputs.latest == true }}
            type=raw,value=${{ inputs.nightly_version }},enable=${{ inputs.nightly_version != '' }}
            type=raw,value=nightly,enable=${{ inputs.nightly_version != '' }}
            type=ref,event=branch,enable=${{ inputs.nightly_version == '' }}
            type=ref,event=tag,enable=${{ inputs.nightly_version == '' }}
            type=sha,prefix=,format=short,enable=${{ inputs.nightly_version == '' && inputs.ref == '' }}

      - name: Create manifest list and push
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}
          META_JSON: ${{ steps.meta.outputs.json }}
          DIGESTS_DIR: ${{ runner.temp }}/digests
        run: |
          shopt -s nullglob
          for arch in amd64 arm64; do
            files=("${DIGESTS_DIR}"/k8s-cache-digests-${arch}/*)
            if [ "${#files[@]}" -ne 1 ] || [ ! -f "${files[0]}" ]; then
              echo "Error: Expected exactly one digest file in k8s-cache-digests-${arch}, found ${#files[@]}"
              exit 1
            fi
          done
          AMD64_DIGEST=$(basename "${DIGESTS_DIR}"/k8s-cache-digests-amd64/*)
          ARM64_DIGEST=$(basename "${DIGESTS_DIR}"/k8s-cache-digests-arm64/*)
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "${META_JSON}") \
            "${GHCR_IMAGE}@sha256:${AMD64_DIGEST}" \
            "${GHCR_IMAGE}@sha256:${ARM64_DIGEST}"

      - name: Sign the images using Cosign with GitHub OIDC Token
        env: # interpolation via env is safer: https://docs.github.com/en/actions/reference/security/secure-use#use-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_TO_INSPECT: ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
        run: |
          for i in 1 2 3 4 5; do
            DIGEST=$(docker buildx imagetools inspect "${IMAGE_TO_INSPECT}" --format '{{json .Manifest}}' 2>/dev/null | jq -r '.digest' | tr -d '\n')
            [ -n "${DIGEST}" ] && [ "${DIGEST}" != "null" ] && break
            echo "Inspect attempt $i failed, retrying in 5s..."
            sleep 5
          done
          if [ -z "${DIGEST}" ] || [ "${DIGEST}" = "null" ]; then echo "Failed to inspect image after 5 attempts"; exit 1; fi
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}
