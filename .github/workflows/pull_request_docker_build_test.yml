name: Build test

on:
  pull_request:
    branches: [main, release-*]
    paths:
      - ".github/workflows/pull_request_docker_build_test.yml"
      - "Dockerfile"
      - "k8scache.Dockerfile"
      - "dependencies.Dockerfile"
      - ".dockerignore"
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "bpf/**"
      - "pkg/internal/java/**"
      - "Makefile"
  workflow_call:
    inputs:
      ref:
        description: "Git ref (commit, branch, or tag) to check out"
        required: false
        type: string

concurrency:
  group: pr-build-test-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - file: Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - file: Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - file: k8scache.Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - file: k8scache.Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Compute short SHA
        id: short_sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./${{ matrix.file }}
          push: false
          platforms: ${{ matrix.platform }}
          build-args: |
            RELEASE_VERSION=${{ inputs.ref || github.ref_name }}
            RELEASE_REVISION=${{ steps.short_sha.outputs.sha }}
