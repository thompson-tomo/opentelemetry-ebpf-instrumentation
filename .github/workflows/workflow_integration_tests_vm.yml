name: Integration tests VM
run-name: >-
  Integration tests VM${{ inputs.pr_number && format(' · PR #{0}', inputs.pr_number) || '' }}${{ inputs.ref && format(' @ {0}', inputs.ref) || '' }}

on:
  push:
    branches: [main, release-*]
  pull_request:
    branches: [main, release-*]
    paths:
      - ".github/workflows/workflow_integration_tests_vm.yml"
      - "bpf/**"
      - "internal/test/integration/**"
      - "internal/test/vm/**"
      - "scripts/generate-integration-matrix.sh"
      - "scripts/kernel-matrix-json.sh"
  workflow_call:
    inputs:
      ref:
        description: "Git ref (commit, branch, or tag) to check out"
        required: false
        type: string
      all_kernels:
        description: "Run the matrix on every kernel in kernels.yaml (ignores pr_integration flag)"
        required: false
        type: boolean
        default: false
      pr_number:
        description: "PR number this dispatch is associated with (informational; surfaced in run-name)"
        required: false
        type: string
    secrets:
      DOCKER_TOKEN_EBPF_INSTRUMENTATION:
        description: "Docker Hub token for pulling images (optional)"
        required: false
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (commit, branch, or tag) to check out"
        required: false
        type: string
      all_kernels:
        description: "Run the matrix on every kernel in kernels.yaml"
        required: false
        type: boolean
        default: false
      pr_number:
        description: "PR number this dispatch is associated with (informational; surfaced in run-name)"
        required: false
        type: string

concurrency:
  group: pr-integration-vm-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vm-test-matrix:
    name: "Build matrix"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      kernels: ${{ steps.build-kernel-matrix.outputs.kernels }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Build test matrix
        id: build-matrix
        env:
          PARTITIONS: 2
        run: |
          echo -n "matrix=" >> $GITHUB_OUTPUT
          make multiprocess-integration-test-matrix-json >> $GITHUB_OUTPUT

      - name: Build kernel matrix
        id: build-kernel-matrix
        env:
          ALL_KERNELS: ${{ inputs.all_kernels }}
        run: |
          echo -n "kernels=" >> "$GITHUB_OUTPUT"
          if [ "$ALL_KERNELS" = "true" ]; then
            bash scripts/kernel-matrix-json.sh --kind=integration --all >> "$GITHUB_OUTPUT"
          else
            bash scripts/kernel-matrix-json.sh --kind=integration >> "$GITHUB_OUTPUT"
          fi

  prep:
    name: Prep test artifacts
    needs: vm-test-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/free-disk

      - name: Check for Docker Hub token
        id: check-docker-token
        run: |
          if [ "${ALLOW_DOCKER_TOKEN}" = "true" ] && [ -n "${DOCKER_TOKEN}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          DOCKER_TOKEN: ${{ (github.event_name != 'workflow_dispatch' || !inputs.ref) && secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION || '' }}
          ALLOW_DOCKER_TOKEN: ${{ github.event_name != 'workflow_dispatch' || !inputs.ref }}

      - name: Log in to Docker Hub
        if: steps.check-docker-token.outputs.has_token == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ (github.event_name != 'workflow_dispatch' || !inputs.ref) && secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION || '' }}

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0 # zizmor: ignore[cache-poisoning] go.sum verifies module integrity
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Go build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-vm-integration-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-vm-integration-${{ runner.os }}-${{ runner.arch }}-

      - name: Generate BPF + build test tools
        run: make prereqs docker-generate

      - name: Pre-compile Go integration tests and gotestsum
        run: |
          mkdir compiled-tests
          ( CGO_ENABLED=0 go test -c -ldflags="-s -w" -o compiled-tests/ ./internal/test/integration ) &
          ( CGO_ENABLED=0 go build -C internal/tools -o ../../compiled-tests/gotestsum -ldflags="-s -w" gotest.tools/gotestsum ) &
          wait

      - name: Cache Docker images
        id: docker-images-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 # zizmor: ignore[cache-poisoning] keyed on hash of compose+Dockerfile+source inputs
        with:
          path: compiled-tests/docker-images.tar
          # OBI binary bakes bpf/cmd/pkg sources; hash them too or source changes reuse stale images.
          key: vm-docker-images-${{ hashFiles('internal/test/integration/docker-compose-multiexec*.yml', 'internal/test/integration/**/Dockerfile*', 'bpf/**', 'cmd/**', 'pkg/**', 'go.mod', 'go.sum') }}

      - name: Pre-build Docker images
        if: steps.docker-images-cache.outputs.cache-hit != 'true'
        run: |
          mapfile -t ENTRIES < <(bash scripts/discover-integration-images.sh --build-targets)
          echo "Discovered ${#ENTRIES[@]} Docker images to pre-build"
          # -P 4 keeps disk + buildkit pressure manageable on a 4-core runner.
          printf '%s\n' "${ENTRIES[@]}" | xargs -P 4 -I {} bash -c '
            entry="$1"; tag="${entry%%=*}"; dockerfile="${entry#*=}"
            echo "Building ${tag} from ${dockerfile}..."
            docker build --quiet -t "${tag}" -f "${dockerfile}" .
          ' _ {}

          IMAGE_TAGS=()
          for entry in "${ENTRIES[@]}"; do
            IMAGE_TAGS+=("${entry%%=*}")
          done

          if [ ${#IMAGE_TAGS[@]} -gt 0 ]; then
            docker save "${IMAGE_TAGS[@]}" -o compiled-tests/docker-images.tar
            echo "Docker images saved ($(du -h compiled-tests/docker-images.tar | cut -f1))"
            docker builder prune -af
          fi

      - name: Compute base-image cache key
        id: cache-key
        env:
          ARCH: ${{ runner.arch }}
          INPUT_REF: ${{ inputs.ref || '' }}
        run: |
          if [ -n "${INPUT_REF}" ]; then
            REF_SCOPE="input-ref-$(printf '%s' "${INPUT_REF}" | sha256sum | cut -d' ' -f1)"
          else
            REF_SCOPE="event-ref"
          fi

          IMAGE_SCOPE="$(bash scripts/discover-integration-images.sh --base-images | sha256sum | cut -d' ' -f1)"
          echo "key=base-images-${ARCH}-${REF_SCOPE}-${IMAGE_SCOPE}" >> "$GITHUB_OUTPUT"

      - name: Cache base images
        id: base-images-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 # zizmor: ignore[cache-poisoning] key derives from the digest-pinned base-image list; images are content-addressable
        with:
          path: compiled-tests/base-images.tar
          key: ${{ steps.cache-key.outputs.key }}

      - name: Pull and save base images
        if: steps.base-images-cache.outputs.cache-hit != 'true'
        run: bash scripts/pull-base-images.sh compiled-tests/base-images.tar

      - name: Cache rootfs images
        id: rootfs-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 # zizmor: ignore[cache-poisoning] keyed on hash of VM Dockerfile
        with:
          path: |
            compiled-tests/rootfs.qcow2
            compiled-tests/rootfs-legacy.qcow2
          key: vm-rootfs-${{ hashFiles('internal/test/vm/Dockerfile') }}

      - name: Install qemu-utils
        if: steps.rootfs-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-utils

      - name: Build rootfs images
        if: steps.rootfs-cache.outputs.cache-hit != 'true'
        run: |
          sudo make -C internal/test/vm WORKDIR="$(pwd)" build-rootfs
          sudo chown "$(id -u):$(id -g)" rootfs.qcow2
          mv rootfs.qcow2 compiled-tests/rootfs.qcow2
          sudo make -C internal/test/vm WORKDIR="$(pwd)" CGROUP_MODE=legacy build-rootfs
          sudo chown "$(id -u):$(id -g)" rootfs-legacy.qcow2
          mv rootfs-legacy.qcow2 compiled-tests/rootfs-legacy.qcow2
          ls -lh compiled-tests/rootfs*.qcow2

      - name: Stage schemas/obi/.deps for weaver
        run: |
          if [ -d schemas/obi/.deps ]; then
            mkdir -p compiled-tests/schemas-deps
            cp -a schemas/obi/.deps/. compiled-tests/schemas-deps/
          fi

      - name: Upload prep artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vm-prep-${{ github.run_id }}
          path: compiled-tests
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  test:
    name: "Kernel ${{ matrix.kernel.id }} / ${{ matrix.test.description }}"
    needs: [vm-test-matrix, prep]
    permissions:
      checks: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        kernel: ${{ fromJson(needs.vm-test-matrix.outputs.kernels).include }}
        test: ${{ fromJson(needs.vm-test-matrix.outputs.matrix).include }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/free-disk
        with:
          docker-prune: 'false'

      - name: Download prep artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vm-prep-${{ github.run_id }}
          path: compiled-tests

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-utils qemu-system-x86

      - name: Stage schemas/obi/.deps from prep artifact
        run: |
          mkdir -p schemas/obi/.deps
          cp -a compiled-tests/schemas-deps/. schemas/obi/.deps/

      - name: Stage rootfs.qcow2
        env:
          CGROUP_MODE: ${{ matrix.kernel.cgroup_mode }}
        run: |
          if [ "$CGROUP_MODE" = "legacy" ]; then
            mv compiled-tests/rootfs-legacy.qcow2 ./rootfs.qcow2
          else
            mv compiled-tests/rootfs.qcow2 ./rootfs.qcow2
          fi
          ls -lh ./rootfs.qcow2

      - id: kernel
        uses: ./.github/actions/setup-lvh-kernel
        with:
          kernel-id: ${{ matrix.kernel.id }}
          lvh-tag: ${{ matrix.kernel.lvh_tag }}

      - name: Run VM integration tests (${{ matrix.test.description }})
        env:
          MATRIX_ID: ${{ matrix.test.id }}
          MATRIX_JSON: ${{ toJson(matrix.test) }}
          MATRIX_TEST_PATTERN: ${{ matrix.test.test_pattern }}
          RUN_NUMBER: ${{ github.run_number }}
          KERNEL_ID: ${{ matrix.kernel.id }}
          KERNEL: ${{ steps.kernel.outputs.kernel }}
          MODULES_DIR: ${{ steps.kernel.outputs.modules-dir }}
          CGROUP_MODE: ${{ matrix.kernel.cgroup_mode }}
        run: |
          echo "VM Partition for kernel ${KERNEL_ID} cgroup_mode=${CGROUP_MODE:-hybrid}"
          echo "${MATRIX_JSON}"

          if [ -z "${MATRIX_TEST_PATTERN}" ]; then
            echo "Error: Test pattern is empty for shard $MATRIX_ID"
            exit 1
          fi

          sudo make -C internal/test/vm \
            WORKDIR="$(pwd)" \
            KERNEL="$KERNEL" \
            MODULES_DIR="$MODULES_DIR" \
            ARCH=amd64 \
            TEST_PATTERN="${MATRIX_TEST_PATTERN}" \
            RUN_NUMBER="${RUN_NUMBER}" \
            PRECOMPILED_TESTS_DIR="$(pwd)/compiled-tests" \
            && [ -f testoutput/success ]

      - name: Process coverage data
        run: make itest-coverage-data

      - name: Report coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./testoutput/itest-covdata.txt
          flags: integration-test-vm-${{ matrix.kernel.id }}
          name: vm-coverage-${{ matrix.kernel.id }}-${{ matrix.test.id }}-${{ github.run_number }}

      - name: Upload integration test logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: vm-logs-${{ matrix.kernel.id }}-${{ matrix.test.id }}-${{ github.run_number }}
          path: |
            testoutput/*.log
            testoutput/kind

