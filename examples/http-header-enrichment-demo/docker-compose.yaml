services:
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    command: ["/app/frontend"]
    environment:
      BACKEND_URL: "http://backend:8081"
    ports:
      - "8080:8080"

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    command: ["/app/backend"]

  loadgen:
    image: curlimages/curl:8.21.0@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13
    depends_on:
      - frontend
    command:
      - /bin/sh
      - -c
      - |
        i=0
        while true; do
          i=$$((i+1))
          tenant="tenant-$$((i % 3 + 1))"
          segment="gold"
          if [ $$((i % 2)) -eq 0 ]; then segment="free"; fi
          curl -sS "http://frontend:8080/checkout" \
            -H "x-tenant-id: $$tenant" \
            -H "x-user-segment: $$segment" \
            -H "authorization: Bearer demo-secret-token-$$i" \
            -H "x-request-id: req-$$i" > /dev/null || true
          sleep 0.2
        done

  jaeger:
    image: jaegertracing/jaeger:2.19.0@sha256:ede4864215be4cd85bd8c3129a2fea6c5713c5653c7282c429dba123014bc68b
    ports:
      - "16686:16686"
      - "4317:4317"

  obi:
    image: ${OBI_IMAGE:-otel/ebpf-instrument:v0.10.0@sha256:9c66cdb920202b9502e6f1b8e9b238757848eded40a0aad262976d6ebea23b02}
    privileged: true
    pid: "host"
    environment:
      OTEL_EBPF_CONFIG_PATH: "/configs/${OBI_CONFIG_FILE:-obi-config-v0.7.0.yml}"
      OTEL_EBPF_OPEN_PORT: "8080"
      OTEL_EBPF_DISCOVERY_POLL_INTERVAL: "500ms"
      OTEL_EBPF_LOG_LEVEL: "${OBI_LOG_LEVEL:-INFO}"
      # Required for Go applications: header enrichment uses the generic HTTP tracer path.
      OTEL_EBPF_SKIP_GO_SPECIFIC_TRACERS: "${OTEL_EBPF_SKIP_GO_SPECIFIC_TRACERS:-true}"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://jaeger:4317"
      OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: "grpc"
    volumes:
      - ./configs:/configs:ro
      - /sys/kernel/security:/sys/kernel/security
    depends_on:
      - frontend
      - backend
      - jaeger
